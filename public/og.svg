<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1200" height="630" fill="#f5eddd" />
  <!-- blueprint grid -->
  <g stroke="#21160d" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200" />
    <path d="M90 0 V630 M180 0 V630 M270 0 V630 M360 0 V630 M450 0 V630 M540 0 V630 M630 0 V630 M720 0 V630 M810 0 V630 M900 0 V630 M990 0 V630 M1080 0 V630" />
  </g>
  <rect x="8" y="8" width="1184" height="614" rx="20" fill="none" stroke="#21160d" stroke-width="3" />

  <!-- logo + eyebrow -->
  <g transform="translate(80 86)">
    <rect x="0" y="22" width="30" height="30" rx="6" fill="#0f6f63" stroke="#21160d" stroke-width="4" />
    <rect x="38" y="22" width="30" height="30" rx="6" fill="#e6a91d" stroke="#21160d" stroke-width="4" />
    <rect x="19" y="-8" width="30" height="30" rx="6" fill="#d63c11" stroke="#21160d" stroke-width="4" />
    <text x="92" y="32" font-family="'Courier New', monospace" font-size="26" letter-spacing="7" fill="#574a3b">CLICK &amp; LEARN ACADEMY</text>
  </g>

  <!-- headline -->
  <text x="78" y="290" font-size="88" font-weight="700" fill="#21160d" letter-spacing="-2">Learn the web by</text>
  <text x="78" y="382" font-size="88" font-weight="700" fill="#21160d" letter-spacing="-2">building <tspan fill="#d63c11">real things.</tspan></text>

  <!-- subhead -->
  <text x="80" y="452" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#574a3b">Free · self-paced · 3 months — from zero to shipped.</text>

  <!-- tech path -->
  <g font-family="'Courier New', monospace" font-size="22" fill="#21160d">
    <text x="80" y="540">HTML → CSS → JavaScript → Tailwind → Alpine → jQuery</text>
  </g>

  <!-- accent bar -->
  <rect x="8" y="600" width="1184" height="22" rx="0" fill="#d63c11" />
</svg>
